<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRC トレーニングジム参加表明</title>

    <style>
        body{
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:420px;
            margin:auto;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

        h1{
            font-size:24px;
            margin:0;
        }

        .info{
            margin-top:15px;
            background:#eef6ff;
            border-radius:10px;
            padding:15px;
            line-height:1.8;
        }

        .calendar{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            padding:40px 0;
            border:2px dashed #ccc;
            border-radius:10px;
            color:#888;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#777;
            font-size:14px;
        }

        .infoButton{
            float:right;
            font-size:26px;
        }
    </style>

</head>

<body>

<div class="infoButton">
